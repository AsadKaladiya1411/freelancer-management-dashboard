version: '3.8'

services:
  server:
    build: ./server
    ports:
      - "5000:5000"
    env_file: ./server/.env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app-network

  client:
    build: ./client
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - app-network

# NOTE: MongoDB is no longer local — we use MongoDB Atlas (cloud).
# The MONGODB_URI in server/.env points to your Atlas cluster.
# No local mongo service needed.

networks:
  app-network:
    driver: bridge
